<!doctype html>
<!--
  Comprehensive manual playground for the Pipedrive App Extensions Mock Host.

  Run from the repo root:
    npm run build
    npx http-server . -p 8080   # or: python3 -m http.server 8080
    open http://localhost:8080/testing/

  Every Command and Event from the design plan has a control here. The app is
  wrapped in <div class="pd-mock-panel"> (the Custom Panel surface). See
  modal.html and floating-window.html for the other two surfaces.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mock Host playground</title>
    <style>
      body {
        font:
          15px/1.5 system-ui,
          sans-serif;
        /* Panel is pinned to the far-left edge (see #surface), like Pipedrive's
           sidebar; the page copy sits to its right. */
        margin: 0;
        padding: 3rem 1.5rem 1.5rem 26rem;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1.2rem;
      }
      h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #5b626b;
        margin: 1.2rem 0 0.4rem;
      }
      button {
        font: inherit;
        padding: 0.35rem 0.7rem;
        margin: 0.15rem 0.15rem 0 0;
        border: 1px solid #1a1a1a;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #f2f2f2;
      }
      input {
        font: inherit;
        padding: 0.25rem 0.45rem;
        width: 5rem;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      #log {
        margin-top: 1rem;
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        background: #11151c;
        color: #d6f5c3;
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        white-space: pre-wrap;
        min-height: 5rem;
      }
    </style>
  </head>
  <body>
    <nav
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 2147483647;
        background: #11151c;
        padding: 6px 12px;
        font:
          13px system-ui,
          sans-serif;
      "
    >
      <a href="index.html" style="color: #8ab4ff; margin-right: 14px">Panel</a>
      <a href="modal.html" style="color: #8ab4ff; margin-right: 14px">Modal</a>
      <a href="floating-window.html" style="color: #8ab4ff">Floating window</a>
    </nav>

    <h1>Pipedrive App Extensions — Mock Host playground</h1>
    <p>
      This app lives in a <code>&lt;div class="pd-mock-panel"&gt;</code>. Every
      Command and Event is wired below; results append to the log.
    </p>

    <div
      class="pd-mock-panel"
      id="surface"
      style="
        position: fixed;
        left: 0;
        top: 2rem;
        padding: 14px;
        box-sizing: border-box;
        overflow: auto;
      "
    >
      <h2>Commands</h2>
      <button data-cmd="snackbar">Snackbar</button>
      <button data-cmd="confirmation">Confirmation</button>
      <button data-cmd="modal-deal">Open deal modal</button>
      <button data-cmd="modal-custom">Open custom modal</button>
      <button data-cmd="close-modal">Close modal</button>
      <button data-cmd="redirect">Redirect → deals</button>
      <button data-cmd="notification">Set notification 3</button>
      <button data-cmd="focus-on">Focus mode on</button>
      <button data-cmd="focus-off">Focus mode off</button>
      <button data-cmd="token">Get signed token</button>
      <br />
      <label
        >Panel height <input id="height" type="number" value="260"
      /></label>
      <button data-cmd="resize">Resize</button>
      <button data-cmd="metadata">Get metadata</button>

      <h2>Events (host → app)</h2>
      <button data-cmd="emit-visibility">Emit VISIBILITY</button>
      <button data-cmd="emit-theme">Emit USER_SETTINGS_CHANGE</button>
      <button data-cmd="emit-close-modal">Emit CLOSE_CUSTOM_MODAL</button>

      <div id="log">booting…</div>
    </div>

    <!-- Real SDK (UMD) → window.AppExtensionsSDK -->
    <script src="../node_modules/@pipedrive/app-extensions-sdk/dist/index.umd.js"></script>
    <!-- Mock Host (IIFE) → window.PipedriveMockHost -->
    <script src="../dist/index.global.js"></script>
    <script>
      (async () => {
        const logEl = document.getElementById('log');
        const heightEl = document.getElementById('height');
        const log = (msg) => {
          logEl.textContent = `${msg}\n${logEl.textContent}`.slice(0, 2000);
        };

        // The UMD global is either the class itself or a namespace whose
        // .default is the class — normalize both. Enums hang off the global.
        const SDKGlobal = window.AppExtensionsSDK;
        const AppExtensionsSDK =
          typeof SDKGlobal === 'function' ? SDKGlobal : SDKGlobal.default;
        const { Command, Event } = SDKGlobal;
        const { startPipedriveMockHost } = window.PipedriveMockHost;

        // Try ?theme=dark to see the dark host UI.
        const theme = new URLSearchParams(location.search).get('theme');
        const host = startPipedriveMockHost({
          theme: theme === 'dark' ? 'dark' : 'light',
          // A relative URL, not inline HTML. Inline closing body markup in this
          // script would confuse live-reload servers (e.g. VS Code Live Server)
          // that inject their snippet before the first closing body tag.
          customModals: { 'demo-modal': 'custom-modal.html' },
        });
        // Open the panel at its maximum height (750px; width is fixed at 385).
        const sdk = await new AppExtensionsSDK({
          identifier: 'dev-local',
        }).initialize({ size: { height: 750 } });
        log('SDK initialized ✓');

        // Listen for every host-driven event and log it.
        for (const ev of [
          Event.VISIBILITY,
          Event.USER_SETTINGS_CHANGE,
          Event.CLOSE_CUSTOM_MODAL,
          Event.PAGE_VISIBILITY_STATE,
        ]) {
          sdk.listen(ev, (r) => log(`event ${ev}: ${JSON.stringify(r.data)}`));
        }

        const actions = {
          snackbar: () =>
            sdk.execute(Command.SHOW_SNACKBAR, {
              message: 'Deal saved!',
              link: { url: '#', label: 'View' },
            }),
          confirmation: async () => {
            const { confirmed } = await sdk.execute(Command.SHOW_CONFIRMATION, {
              title: 'Delete this deal?',
              description: 'This cannot be undone.',
              okText: 'Delete',
              okColor: 'negative',
            });
            log(`confirmation → confirmed: ${confirmed}`);
          },
          'modal-deal': async () => {
            const r = await sdk.execute(Command.OPEN_MODAL, { type: 'deal' });
            log(`deal modal → ${JSON.stringify(r)}`);
          },
          'modal-custom': async () => {
            const r = await sdk.execute(Command.OPEN_MODAL, {
              type: 'custom_modal',
              action_id: 'demo-modal',
            });
            log(`custom modal → ${JSON.stringify(r)}`);
          },
          'close-modal': () => sdk.execute(Command.CLOSE_MODAL),
          redirect: () =>
            sdk.execute(Command.REDIRECT_TO, { view: 'deals', id: 42 }),
          notification: () =>
            sdk.execute(Command.SET_NOTIFICATION, { number: 3 }),
          'focus-on': () => sdk.execute(Command.SET_FOCUS_MODE, true),
          'focus-off': () => sdk.execute(Command.SET_FOCUS_MODE, false),
          token: async () => {
            const { token } = await sdk.execute(Command.GET_SIGNED_TOKEN);
            log(`signed token → ${token}`);
          },
          resize: () =>
            sdk.execute(Command.RESIZE, { height: Number(heightEl.value) }),
          metadata: async () => {
            const m = await sdk.execute(Command.GET_METADATA);
            log(`metadata → ${m.windowWidth}×${m.windowHeight}px`);
          },
          'emit-visibility': () =>
            host.emit(Event.VISIBILITY, {
              is_visible: true,
              context: { invoker: 'user' },
            }),
          'emit-theme': () =>
            host.emit(Event.USER_SETTINGS_CHANGE, { theme: 'dark' }),
          'emit-close-modal': () => host.emit(Event.CLOSE_CUSTOM_MODAL),
        };

        document.querySelectorAll('button[data-cmd]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            try {
              await actions[btn.dataset.cmd]?.();
              log(`▶ ${btn.dataset.cmd}`);
            } catch (err) {
              log(`✗ ${btn.dataset.cmd}: ${err.message}`);
            }
          });
        });
      })().catch((err) => {
        document.getElementById('log').textContent = 'Error: ' + err.message;
      });
    </script>
  </body>
</html>
