<!doctype html>
<!--
  Manual playground for the Floating Window surface wrapper.

  Run from the repo root:
    npm run build
    npx http-server . -p 8080   # or: python3 -m http.server 8080
    open http://localhost:8080/testing/floating-window.html

  The app is wrapped in <div class="pd-mock-floating-window"> — the Mock Host
  styles it as a fixed top-right window (width 200-800, height 70-700). The
  surface is a placeholder ("Your app renders here"); resize it and toggle its
  visibility from the Dev Tool (its Resize + Floating window controls show only
  on this surface). The Show/Hide buttons stay in the page because they exercise
  the app-side SHOW/HIDE_FLOATING_WINDOW Commands the Dev Tool can't send.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mock Host — Floating Window</title>
    <style>
      body {
        font:
          16px/1.5 system-ui,
          sans-serif;
        max-width: 40rem;
        margin: 3rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
      }

      h1 {
        font-size: 1.25rem;
      }

      button {
        font: inherit;
        padding: 0.4rem 0.8rem;
        border: 1px solid #1a1a1a;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }

      /* Stand-in for the consumer's app — see index.html. */
      .app-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        height: 100%;
        min-height: 120px;
        box-sizing: border-box;
        text-align: center;
        border: 2px dashed #d0d4da;
        border-radius: 8px;
        color: #6b7280;
      }

      .app-placeholder strong {
        font-size: 1rem;
        color: #1a1a1a;
      }

      .app-placeholder span {
        font-size: 0.8rem;
      }
    </style>
  </head>

  <body>
    <nav
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 2147483647;
        background: #11151c;
        padding: 6px 12px;
        font:
          13px system-ui,
          sans-serif;
      "
    >
      <a href="index.html" style="color: #8ab4ff; margin-right: 14px">Panel</a>
      <a href="modal.html" style="color: #8ab4ff; margin-right: 14px">Modal</a>
      <a href="floating-window.html" style="color: #8ab4ff">Floating window</a>
    </nav>

    <h1>Floating Window surface</h1>
    <p>
      Your app renders into
      <code>&lt;div class="pd-mock-floating-window"&gt;</code>, fixed to the
      top-right corner — here it's just a placeholder. Resize it and toggle its
      visibility from the <strong>Dev Tool</strong>.
    </p>
    <!-- Pinned bottom-left so the top-right floating window never covers them. -->
    <p style="position: fixed; bottom: 1rem; left: 1rem; margin: 0">
      <button id="show" disabled>Show floating window</button>
      <button id="hide" disabled>Hide floating window</button>
    </p>

    <div class="pd-mock-floating-window" id="surface" style="padding: 12px">
      <div class="app-placeholder">
        <strong>Your app renders here</strong>
        <span>Floating Window surface</span>
      </div>
    </div>

    <!-- Real SDK (UMD) → window.AppExtensionsSDK -->
    <script src="../node_modules/@pipedrive/app-extensions-sdk/dist/index.umd.js"></script>
    <!-- Mock Host (IIFE) → window.PipedriveMockHost -->
    <script src="../dist/index.global.js"></script>
    <script>
      (async () => {
        const SDKGlobal = window.AppExtensionsSDK;
        const AppExtensionsSDK =
          typeof SDKGlobal === 'function' ? SDKGlobal : SDKGlobal.default;
        const { Command, Event } = SDKGlobal;
        const { startPipedriveMockHost } = window.PipedriveMockHost;

        startPipedriveMockHost();
        // A compact floating window (well within the 200–800 × 70–700 bounds).
        const sdk = await new AppExtensionsSDK({
          identifier: 'dev-local',
        }).initialize({ size: { width: 720, height: 420 } });

        // Log the floating window's visibility whenever it changes.
        sdk.listen(Event.VISIBILITY, (r) => {
          console.log(
            '[floating-window] VISIBILITY is_visible:',
            r.data?.is_visible,
            r.data,
          );
        });

        document.getElementById('show').disabled = false;
        document.getElementById('hide').disabled = false;

        document.getElementById('show').addEventListener('click', () => {
          sdk.execute(Command.SHOW_FLOATING_WINDOW, {});
        });
        document.getElementById('hide').addEventListener('click', () => {
          sdk.execute(Command.HIDE_FLOATING_WINDOW, {});
        });
      })().catch((err) => {
        console.error('[floating-window] init failed:', err);
      });
    </script>
  </body>
</html>
